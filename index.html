<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전사 전산기기 자산조사 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ======================================================================
        // 0. React 전용 Lucide SVG 아이콘 고정밀 컴포넌트 팩 (런타임 에러 방지)
        // ======================================================================
        const Search = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const Download = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const Upload = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
        const Plus = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const AlertTriangle = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
        const CheckCircle = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const LogOut = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;
        const Edit2 = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
        const Database = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"></path></svg>;
        const FileText = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const X = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const RefreshCw = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
        const Layers = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polygon points="2 17 12 22 22 17"></polygon><polygon points="2 12 12 17 22 12"></polygon></svg>;
        const UserCheck = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>;
        const Filter = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>;
        const AlertCircle = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const FileSpreadsheet = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="8" y1="13" x2="16" y2="13"></line><line x1="8" y1="17" x2="16" y2="17"></line><line x1="10" y1="9" x2="10" y2="9.01"></line></svg>;
        const ShieldCheck = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 11 11 13 15 9"></polyline></svg>;
        const CheckSquare = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>;
        const Save = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;

        // ======================================================================
        // 1. 기준 마스터 정보 정의 (조직도, 품목 구분 및 드롭다운 기준 데이터)
        // ======================================================================
        const DEPARTMENTS = [
          { id: "admin", upper: "관리자", team: "ADMIN", part: "관리자(ADMIN)" },
          { id: "dept1", upper: "경영지원실", team: "운영지원팀", part: "사업운영지원파트" },
          { id: "dept2", upper: "경영지원실", team: "운영지원팀", part: "HR지원파트" },
          { id: "dept3", upper: "경영지원실", team: "인사팀", part: "인사파트" },
          { id: "dept4", upper: "경영지원실", team: "인사팀", part: "인재개발파트" },
          { id: "dept5", upper: "GA영업부문", team: "GA영업1본부", part: "강북GA사업단-한강GA지점" },
          { id: "dept6", upper: "전속영업부문", team: "서울지역본부", part: "서울지역단-일산지점" }
        ];

        const ITEMS = [
          { name: "pc본체(일반형)", code: "T" },
          { name: "pc본체(대리점용)", code: "H" },
          { name: "노트북", code: "N" },
          { name: "모니터", code: "M" },
          { name: "스캐너", code: "S" },
          { name: "프린터", code: "P" }
        ];

        const PURPOSES = ["임직원", "대리점", "프로젝트", "공용", "인터넷pc", "교차", "sfp용"];

        const SURVEY_STATUS = {
          "보유": ["QR등록", "QR미부착", "QR오류"],
          "미보유": ["반납", "망실", "손실", "이동"]
        };

        const appId = 'it-asset-survey-v1';

        // 19자리 임의 자산번호 제네레이터
        const generateAssetNo = () => {
          let result = '';
          for (let i = 0; i < 19; i++) { result += Math.floor(Math.random() * 10).toString(); }
          return result;
        };

        // 파트별 10개씩 총 60개 모크 데이터를 로컬 저장소에 구축하는 시드 제네레이터
        const generateInitialAssets = () => {
          const result = [];
          const normalDepts = DEPARTMENTS.filter(d => d.id !== "admin");
          const lastNames = ["민준", "서연", "도윤", "서현", "예준", "수빈", "시우", "유진", "지호", "혜원"];
          const firstNames = ["김", "이", "박", "최", "정", "강", "조", "윤", "장", "임"];
          
          normalDepts.forEach((dept, deptIdx) => {
            for (let i = 1; i <= 10; i++) {
              const item = ITEMS[(i - 1) % ITEMS.length];
              let model = "";
              if (item.name === "pc본체(일반형)") model = "DB181-2(삼보)";
              else if (item.name === "pc본체(대리점용)") model = "50t(레노버)";
              else if (item.name === "모니터") model = "모니터(24인치)";
              else if (item.name === "노트북") model = "NT951XGK(삼성)";
              else if (item.name === "스캐너") model = "M160(캐논)";
              else if (item.name === "프린터") model = "HL-L6415DW(브라더)";

              const partSeed = String(deptIdx + 1);
              const rowSeed = String(i).padStart(2, "0");
              const randomPart = String(10000000 + i * 4927).padStart(8, "0");
              const assetNo = `3059481${partSeed}${rowSeed}${randomPart}1234`.substring(0, 19);

              const year = 2023 + (i % 4);
              const month = String((i % 12) + 1).padStart(2, '0');
              const day = String((i * 2 % 28) + 1).padStart(2, '0');
              const seqStr = String(i + deptIdx * 10).padStart(4, '0');
              const mgmtNo = `${item.code}${year}${month}${day}${seqStr}`;
              
              const userLastName = lastNames[(deptIdx + i) % lastNames.length];
              const userFirstName = firstNames[(deptIdx * 3 + i) % firstNames.length];

              result.push({
                assetNo: assetNo,
                mgmtNo: mgmtNo,
                itemName: item.name,
                modelName: model,
                acquireDate: `${year}-${month}-${day}`,
                upperDept: dept.upper,
                dept: `${dept.team}-${dept.part}`,
                address: `${dept.team} 실내`,
                addressDetail: `${i}번 구역`,
                user: `${userFirstName}${userLastName}`,
                surveyDept: "",
                surveyUser: "",
                purpose: "",
                status: "",
                statusDetail: "",
                basis: "",
                memo: "",
                submitStatus: ""
              });
            }
          });
          return result;
        };

        // ======================================================================
        // 2. 메인 App 컴포넌트 (100% 기능 이식 및 로컬 가상 싱크 제어)
        // ======================================================================
        function App() {
          const [loading, setLoading] = useState(false);
          const [assets, setAssets] = useState([]);
          
          // 로그인 관련 인증 컨텍스트
          const [selectedDeptId, setSelectedDeptId] = useState("dept1");
          const [userPasswordInput, setUserPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");
          const [currentUser, setCurrentUser] = useState(null);

          // 필터 및 실시간 검색 스테이트
          const [searchQuery, setSearchQuery] = useState("");
          const [filterUpperDept, setFilterUpperDept] = useState("전체");
          const [filterSurveyStatus, setFilterSurveyStatus] = useState("전체");
          const [filterItemName, setFilterItemName] = useState("전체");

          // 인라인 편집 버퍼 보존 저장소
          const [rowEdits, setRowEdits] = useState({});

          // 모달 트리거 상태 제어
          const [isEditModalOpen, setIsEditModalOpen] = useState(false);
          const [selectedAsset, setSelectedAsset] = useState(null);
          const [isAddModalOpen, setIsAddModalOpen] = useState(false);
          const [isUploadModalOpen, setIsUploadModalOpen] = useState(false);

          // 대량 CSV 수용 및 리포트 저장소
          const [csvText, setCsvText] = useState("");
          const [csvFeedback, setCsvFeedback] = useState(null);

          // 다이얼로그 도우미용 피드백
          const [notification, setNotification] = useState(null);
          const [customModal, setCustomModal] = useState(null);

          // 최고 관리자(ADMIN) 수기 자산 발급 폼 모델
          const [formAsset, setFormAsset] = useState({
            assetNo: "", mgmtNo: "", itemName: "pc본체(일반형)", modelName: "DB181-2(삼보)",
            acquireDate: new Date().toISOString().substring(0, 10), upperDept: "경영지원실",
            dept: "운영지원팀-사업운영지원파트", address: "", addressDetail: "", user: "",
            surveyDept: "", surveyUser: "", purpose: "", status: "", statusDetail: "", basis: "", memo: "", submitStatus: ""
          });

          // 컴포넌트 첫 구동 시 가상 Sandbox 스토리지 바인딩 처리
          useEffect(() => {
            setLoading(true);
            const localData = localStorage.getItem(`mock_assets_${appId}`);
            if (localData) {
              setAssets(JSON.parse(localData));
            } else {
              const seedList = generateInitialAssets();
              localStorage.setItem(`mock_assets_${appId}`, JSON.stringify(seedList));
              setAssets(seedList);
            }
            setLoading(false);
          }, []);

          const forceReloadInitialDatabase = () => {
            const seedList = generateInitialAssets();
            localStorage.setItem(`mock_assets_${appId}`, JSON.stringify(seedList));
            setAssets(seedList);
            setRowEdits({});
            showNotification("success", "기초 자산 데이터 60대가 초기화 복원되었습니다.");
          };

          const showNotification = (type, text) => {
            setNotification({ type, text });
            setTimeout(() => setNotification(null), 4000);
          };

          const showAlert = (text) => {
            setCustomModal({ title: "알림 수신", text, type: "alert" });
          };

          const showConfirm = (text, onConfirm) => {
            setCustomModal({ title: "동기화 의사 확인", text, type: "confirm", onConfirm });
          };

          // ======================================================================
          // 3. 자산번호 & 전산관리번호 정밀 정합성 검증 엔진 (비즈니스 규칙 적용)
          // ======================================================================
          const getValidationErrors = (asset, isNew = false, allAssets = []) => {
            const errors = [];

            if (!asset.assetNo || asset.assetNo.trim() === '') {
              errors.push("자산번호가 입력되지 않았습니다.");
            } else if (!/^\d{19}$/.test(asset.assetNo)) {
              errors.push("자산번호는 정확히 19자리의 숫자형태여야 합니다.");
            }

            if (isNew) {
              const isDuplicatedAssetNo = allAssets.some(item => item.assetNo === asset.assetNo);
              if (isDuplicatedAssetNo) {
                errors.push(`자산번호 [${asset.assetNo}]가 이미 전사에 존재합니다.`);
              }
            }

            const mgmtNo = asset.mgmtNo ? asset.mgmtNo.trim() : "";
            if (mgmtNo === '') {
              errors.push("전산관리번호가 누락되었습니다.");
            } else {
              if (!/^[THNMPS]\d{8}\d{4}$/.test(mgmtNo)) {
                errors.push("전산관리번호 규격 이상 (알파벳 1자리+년월일8자리+순번4자리 총 13자리)");
              } else {
                const matchingItem = ITEMS.find(i => i.name === asset.itemName);
                if (matchingItem && mgmtNo[0] !== matchingItem.code) {
                  errors.push(`품목명(${asset.itemName}) 기호는 [${matchingItem.code}] 이나, 관리번호는 [${mgmtNo[0]}]로 매핑되어 정합성이 깨졌습니다.`);
                }
              }
            }

            if (isNew && mgmtNo !== '') {
              const isDuplicatedMgmtNo = allAssets.some(item => item.mgmtNo === mgmtNo);
              if (isDuplicatedMgmtNo) {
                errors.push(`전산관리번호 [${mgmtNo}]가 이미 전사 DB에 존재합니다.`);
              }
            }

            if (asset.status === "보유") {
              const allowed = SURVEY_STATUS["보유"];
              if (asset.statusDetail && !allowed.includes(asset.statusDetail)) {
                errors.push(`'보유' 상태의 세부 사항은 [${allowed.join(', ')}] 중 하나여야 합니다.`);
              }
            } else if (asset.status === "미보유") {
              const allowed = SURVEY_STATUS["미보유"];
              if (asset.statusDetail && !allowed.includes(asset.statusDetail)) {
                errors.push(`'미보유' 상태의 세부 사항은 [${allowed.join(', ')}] 중 하나여야 합니다.`);
              }
            }

            return errors;
          };

          // 실시간 모든 데이터 유효성 이상 검사 보고서 생성 (useMemo)
          const validationAnomalies = useMemo(() => {
            const anomalies = [];
            assets.forEach(asset => {
              const errs = getValidationErrors(asset, false, []);
              const dupAssets = assets.filter(a => a.assetNo === asset.assetNo);
              if (dupAssets.length > 1) errs.push("동일한 자산번호가 전사 DB 내에 2건 이상 중복 존재합니다.");
              const dupMgmts = assets.filter(a => a.mgmtNo === asset.mgmtNo && asset.mgmtNo !== "");
              if (dupMgmts.length > 1) errs.push("동일한 전산관리번호가 전사 DB 내에 2건 이상 중복 존재합니다.");

              if (errs.length > 0) {
                anomalies.push({
                  assetNo: asset.assetNo,
                  mgmtNo: asset.mgmtNo || "미정",
                  itemName: asset.itemName,
                  dept: `${asset.upperDept} ${asset.dept}`,
                  errors: errs
                });
              }
            });
            return anomalies;
          }, [assets]);

          const isDeptSubmitted = useMemo(() => {
            if (!currentUser || currentUser.dept.id === 'admin') return false;
            const deptAssets = assets.filter(a => `${a.upperDept} ${a.dept}`.includes(currentUser.dept.part));
            if (deptAssets.length === 0) return false;
            return deptAssets.every(a => a.submitStatus === "제출완료");
          }, [assets, currentUser]);

          const hasTempSaved = useMemo(() => {
            return filteredAssets.some(a => a.submitStatus === "임시저장");
          }, [filteredAssets]);

          // ======================================================================
          // 4. 이벤트 핸들러 기능 명세 구현단
          // ======================================================================
          const handleLogin = (e) => {
            e.preventDefault();
            setLoginError("");
            const targetDept = DEPARTMENTS.find(d => d.id === selectedDeptId);
            if (!targetDept) {
              setLoginError("해당 부서를 찾을 수 없습니다.");
              return;
            }
            const isCorrect = (targetDept.id === 'admin' && userPasswordInput === 'admin') ||
                              (targetDept.id !== 'admin' && userPasswordInput === '1234');
            if (isCorrect) {
              setCurrentUser({
                name: targetDept.id === 'admin' ? "관리자" : `${targetDept.team} 담당자`,
                dept: targetDept
              });
              setUserPasswordInput("");
              showNotification("success", `${targetDept.part} 권한으로 가상 클라우드에 연결되었습니다.`);
            } else {
              setLoginError("입력하신 비밀번호가 올바르지 않습니다.");
            }
          };

          const handleLogout = () => {
            setCurrentUser(null);
            setRowEdits({});
            showNotification("success", "로그아웃되었습니다.");
          };

          const handleCreateAsset = (e) => {
            e.preventDefault();
            if (currentUser?.dept?.id !== 'admin') return;

            const errs = getValidationErrors(formAsset, true, assets);
            if (errs.length > 0) {
              showAlert(`규격 위반 또는 중복이 존재합니다.\n\n${errs.join('\n')}`);
              return;
            }

            const nextAsset = { 
              ...formAsset, 
              updatedBy: `관리자 ${currentUser.name}`, 
              updatedAt: new Date().toISOString() 
            };
            const updatedAssets = [...assets, nextAsset];
            localStorage.setItem(`mock_assets_${appId}`, JSON.stringify(updatedAssets));
            setAssets(updatedAssets);
            setIsAddModalOpen(false);
            showNotification("success", "원천 데이터베이스에 신규 자산이 안전하게 가로채기 등록되었습니다.");
          };

          const handleFieldChange = (assetNo, field, value) => {
            if (isDeptSubmitted) return;
            setRowEdits(prev => {
              const currentAsset = assets.find(a => a.assetNo === assetNo) || {};
              const currentEdit = prev[assetNo] || {
                surveyDept: currentAsset.surveyDept || "", surveyUser: currentAsset.surveyUser || "",
                purpose: currentAsset.purpose || "", status: currentAsset.status || "",
                statusDetail: currentAsset.statusDetail || "", basis: currentAsset.basis || "", memo: currentAsset.memo || ""
              };

              const updated = { ...currentEdit, [field]: value };
              if (field === "status") {
                if (value === "보유") updated.statusDetail = "QR등록";
                else if (value === "미보유") updated.statusDetail = "반납";
                else updated.statusDetail = "";
              }
              return { ...prev, [assetNo]: updated };
            });
          };

          const handleApplyMyDeptAll = () => {
            if (isDeptSubmitted) return;
            if (!currentUser || currentUser.dept.id === 'admin') {
              showAlert("부서 담당자 권한으로 로그인 한 상태에서만 자동입력이 지원됩니다.");
              return;
            }
            const fullDeptString = `${currentUser.dept.upper}-${currentUser.dept.team}-${currentUser.dept.part}`;
            filteredAssets.forEach(asset => {
              handleFieldChange(asset.assetNo, 'surveyDept', fullDeptString);
            });
            showNotification("success", "화면상의 모든 필터 자산에 내 부서명이 일괄 세팅되었습니다.");
          };

          const handleBatchSaveTemp = () => {
            if (isDeptSubmitted) return;
            const targetsToSave = [];
            let validationFailed = false;
            let failedMsg = "";

            filteredAssets.forEach(asset => {
              const edits = rowEdits[asset.assetNo];
              if (edits || asset.submitStatus !== "제출완료") {
                const merged = {
                  assetNo: asset.assetNo, mgmtNo: asset.mgmtNo, itemName: asset.itemName,
                  surveyDept: edits?.surveyDept !== undefined ? edits.surveyDept : (asset.surveyDept || ""),
                  surveyUser: edits?.surveyUser !== undefined ? edits.surveyUser : (asset.surveyUser || ""),
                  purpose: edits?.purpose !== undefined ? edits.purpose : (asset.purpose || ""),
                  status: edits?.status !== undefined ? edits.status : (asset.status || ""),
                  statusDetail: edits?.statusDetail !== undefined ? edits.statusDetail : (asset.statusDetail || ""),
                  basis: edits?.basis !== undefined ? edits.basis : (asset.basis || ""),
                  memo: edits?.memo !== undefined ? edits.memo : (asset.memo || "")
                };

                const errs = getValidationErrors(merged, false, assets);
                if (errs.length > 0) {
                  validationFailed = true;
                  failedMsg += `• 자산 [${merged.assetNo}]:\n  ${errs.join('\n  ')}\n`;
                } else {
                  targetsToSave.push(merged);
                }
              }
            });

            if (validationFailed) {
              showAlert(`임시저장 불가: 아래 항목의 규격 정합성을 먼저 맞추어 주세요.\n\n${failedMsg}`);
              return;
            }

            if (targetsToSave.length === 0) {
              showNotification("success", "수정된 자산 변동 사항이 없습니다.");
              return;
            }

            const updatedAssets = assets.map(asset => {
              const target = targetsToSave.find(t => t.assetNo === asset.assetNo);
              if (target) {
                return {
                  ...asset, ...target,
                  submitStatus: "임시저장",
                  updatedBy: `${currentUser.dept.part} ${currentUser.name}`,
                  updatedAt: new Date().toISOString()
                };
              }
              return asset;
            });

            localStorage.setItem(`mock_assets_${appId}`, JSON.stringify(updatedAssets));
            setAssets(updatedAssets);
            setRowEdits({});
            showNotification("success", `총 ${targetsToSave.length}건의 실사 명세가 로컬 '임시저장' 처리되었습니다.`);
          };

          const handleBatchSubmitFinal = () => {
            if (isDeptSubmitted) return;
            if (!currentUser || currentUser.dept.id === 'admin') return;

            const deptAssets = assets.filter(a => `${a.upperDept} ${a.dept}`.includes(currentUser.dept.part));
            let checkFailed = false;
            let failedDetails = "";
            const targetsToSave = [];

            deptAssets.forEach(asset => {
              const edits = rowEdits[asset.assetNo] || {};
              const surveyDept = edits.surveyDept !== undefined ? edits.surveyDept : (asset.surveyDept || "");
              const surveyUser = edits.surveyUser !== undefined ? edits.surveyUser : (asset.surveyUser || "");
              const purpose = edits.purpose !== undefined ? edits.purpose : (asset.purpose || "");
              const status = edits.status !== undefined ? edits.status : (asset.status || "");
              const statusDetail = edits.statusDetail !== undefined ? edits.statusDetail : (asset.statusDetail || "");
              const basis = edits.basis !== undefined ? edits.basis : (asset.basis || "");
              const memo = edits.memo !== undefined ? edits.memo : (asset.memo || "");

              if (!surveyDept.trim() || !surveyUser.trim() || !purpose || !status || !statusDetail) {
                checkFailed = true;
                failedDetails += `• 자산번호 ${asset.assetNo} (${asset.modelName}): 필수 실사항목 기입 누락\n`;
              } else {
                targetsToSave.push({
                  assetNo: asset.assetNo,
                  payload: {
                    surveyDept, surveyUser, purpose, status, statusDetail, basis, memo,
                    submitStatus: "제출완료",
                    updatedBy: `${currentUser.dept.part} ${currentUser.name} 최종제출`,
                    updatedAt: new Date().toISOString()
                  }
                });
              }
            });

            if (checkFailed) {
              showAlert(`결과제출 실패: 조사 대상 중 누락된 항목이 포착되었습니다.\n\n${failedDetails}`);
              return;
            }

            showConfirm(`내 관할 자산 ${deptAssets.length}건을 원천 마스터 대장으로 최종 제출하시겠습니까? 제출 후 실사폼이 전면 잠금 처리됩니다.`, () => {
              const updatedAssets = assets.map(asset => {
                const target = targetsToSave.find(t => t.assetNo === asset.assetNo);
                return target ? { ...asset, ...target.payload } : asset;
              });
              localStorage.setItem(`mock_assets_${appId}`, JSON.stringify(updatedAssets));
              setAssets(updatedAssets);
              setRowEdits({});
              showNotification("success", "성공적으로 최종 락(Lock) 결재 및 마스터 등록 처리가 완료되었습니다.");
            });
          };

          const handleBatchCancelSubmit = () => {
            if (!currentUser || currentUser.dept.id === 'admin') return;
            showConfirm("마스터 제출 상태를 정식 철회하고 수정을 다시 활성화하시겠습니까?", () => {
              const updatedAssets = assets.map(asset => {
                if (`${asset.upperDept} ${asset.dept}`.includes(currentUser.dept.part)) {
                  return {
                    ...asset,
                    submitStatus: "임시저장",
                    updatedBy: `${currentUser.dept.part} ${currentUser.name} 제출취소`,
                    updatedAt: new Date().toISOString()
                  };
                }
                return asset;
              });
              localStorage.setItem(`mock_assets_${appId}`, JSON.stringify(updatedAssets));
              setAssets(updatedAssets);
              showNotification("success", "제출이 전면 취소되어 마스터 인라인 편집 필드가 긴급 활성화되었습니다.");
            });
          };

          const handleUpdateAssetBase = (e) => {
            e.preventDefault();
            if (currentUser?.dept?.id !== 'admin') return;

            const errs = getValidationErrors(selectedAsset, false, assets);
            if (errs.length > 0) {
              showAlert(`저장 차단: 규격 입력 오류를 시정하십시오.\n\n${errs.join('\n')}`);
              return;
            }

            let updatedAssets = [...assets];
            if (selectedAsset.id && selectedAsset.assetNo !== selectedAsset.id) {
              updatedAssets = updatedAssets.filter(a => a.assetNo !== selectedAsset.id);
            }

            const updatedData = { ...selectedAsset };
            delete updatedData.id;
            updatedData.updatedBy = "관리자 강제수정";
            updatedData.updatedAt = new Date().toISOString();

            const index = updatedAssets.findIndex(a => a.assetNo === selectedAsset.assetNo);
            if (index !== -1) updatedAssets[index] = updatedData;
            else updatedAssets.push(updatedData);

            localStorage.setItem(`mock_assets_${appId}`, JSON.stringify(updatedAssets));
            setAssets(updatedAssets);
            setIsEditModalOpen(false);
            showNotification("success", "최고 대장 원천 정보가 실시간으로 강제 치환되었습니다.");
          };

          const handleDeleteAsset = (assetNo) => {
            if (currentUser?.dept?.id !== 'admin') return;
            showConfirm("이 자산을 마스터 데이터베이스에서 복구 불가능하게 영구 파기하시겠습니까?", () => {
              const updatedAssets = assets.filter(a => a.assetNo !== assetNo);
              localStorage.setItem(`mock_assets_${appId}`, JSON.stringify(updatedAssets));
              setAssets(updatedAssets);
              setIsEditModalOpen(false);
              showNotification("success", "선택된 원천 자산 개체가 영구 말소되었습니다.");
            });
          };

          // 실사 결과 대장 전체 구조 고성능 CSV 내보내기 엔진
          const handleExportCSV = () => {
            const isUserAdmin = currentUser?.dept?.id === 'admin';
            const assetsToExport = isUserAdmin ? assets : filteredAssets;
            const headers = [
              "자산번호", "전산관리번호", "품목명", "모델명", "취득연월일", "상위부서", "사용부서", "주소", "상세주소", "사용자", 
              "실제현사용부서", "실제현사용자", "용도", "상태", "상태세부내용", "관련근거", "비고", "제출상태"
            ];
            const rows = assetsToExport.map(a => [
              a.assetNo || "", a.mgmtNo || "", a.itemName || "", a.modelName || "", a.acquireDate || "", a.upperDept || "", a.dept || "", a.address || "", a.addressDetail || "", a.user || "", a.surveyDept || "", a.surveyUser || "", a.purpose || "", a.status || "", a.statusDetail || "", a.basis || "", a.memo || "", a.submitStatus || ""
            ]);

            const csvContent = [headers.join(","), ...rows.map(row => row.map(val => `"${val.replace(/"/g, '""')}"`).join(","))].join("\n");
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", isUserAdmin ? "전사_전산기기_자산실사결과_취합대장.csv" : `소속_자산실사현황_${new Date().toISOString().substring(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showNotification("success", "대장 인프라 스펙이 엑셀 호환형 CSV로 긴급 추출되었습니다.");
          };

          // CSV 덤프 파싱 및 유효성 실시간 하이재킹 가이드 매핑 엔진
          const handleUploadCSV = () => {
            if (isDeptSubmitted) {
              showAlert("결재 완료된 소속 부서입니다. 업로드 연동을 하려면 제출 취소를 선행하십시오.");
              return;
            }
            if (!csvText.trim()) {
              showAlert("분석 텍스트 스트림 영역이 공란입니다.");
              return;
            }
            const lines = csvText.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            if (lines.length <= 1) {
              showAlert("필드 바인딩 헤더 정보 외에 레코드가 식별되지 않습니다.");
              return;
            }

            const header = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
            const dataLines = lines.slice(1);
            const parsedAssets = [];
            let errorsFound = 0;
            const feedbackList = [];

            const getIndex = (names) => header.findIndex(h => names.some(n => h.includes(n)));
            const idxAssetNo = getIndex(["자산번호", "assetNo"]);
            const idxMgmtNo = getIndex(["전산관리번호", "mgmtNo", "관리번호"]);
            const idxItemName = getIndex(["품목명", "itemName", "품목"]);
            const idxModelName = getIndex(["모델명", "modelName", "모델"]);
            const idxAcquireDate = getIndex(["취득연월일", "acquireDate", "취득"]);
            const idxUpperDept = getIndex(["상위부서", "upperDept"]);
            const idxDept = getIndex(["사용부서", "dept"]);
            const idxAddress = getIndex(["주소", "address"]);
            const idxAddressDetail = getIndex(["상세주소", "addressDetail"]);
            const idxUser = getIndex(["사용자", "user"]);
            const idxSurveyDept = getIndex(["실제현사용부서", "실제 현 사용부서", "surveyDept"]);
            const idxSurveyUser = getIndex(["실제현사용자", "실제 현 사용자", "surveyUser"]);
            const idxPurpose = getIndex(["용도", "purpose"]);
            const idxStatus = getIndex(["상태", "status"]);
            const idxStatusDetail = getIndex(["상태세부내용", "상태 세부내용", "statusDetail"]);
            const idxBasis = getIndex(["관련근거", "basis"]);
            const idxMemo = getIndex(["비고", "memo"]);

            dataLines.forEach((line, idx) => {
              const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || line.split(',');
              const cleanParts = matches.map(part => part.replace(/^"|"$/g, '').trim());
              const getVal = (index, fallback = "") => (index !== -1 && index < cleanParts.length) ? cleanParts[index] : fallback;

              let parsedAssetNo = getVal(idxAssetNo);
              if (!parsedAssetNo) parsedAssetNo = generateAssetNo();

              const rowAsset = {
                assetNo: parsedAssetNo, mgmtNo: getVal(idxMgmtNo), itemName: getVal(idxItemName, "pc본체(일반형)"),
                modelName: getVal(idxModelName, "미정"), acquireDate: getVal(idxAcquireDate, new Date().toISOString().substring(0, 10)),
                upperDept: getVal(idxUpperDept, "경영지원실"), dept: getVal(idxDept, "운영지원팀-사업운영지원파트"),
                address: getVal(idxAddress, ""), addressDetail: getVal(idxAddressDetail, ""), user: getVal(idxUser, "미정"),
                surveyDept: getVal(idxSurveyDept, ""), surveyUser: getVal(idxSurveyUser, ""), purpose: getVal(idxPurpose, ""),
                status: getVal(idxStatus, ""), statusDetail: getVal(idxStatusDetail, ""), basis: getVal(idxBasis, ""), memo: getVal(idxMemo, ""), submitStatus: "임시저장"
              };

              if (currentUser && currentUser.dept.id !== 'admin') {
                if (!`${rowAsset.upperDept} ${rowAsset.dept}`.includes(currentUser.dept.part)) {
                  errorsFound++;
                  feedbackList.push({ row: idx + 2, mgmtNo: rowAsset.mgmtNo, errors: ["타부서 소속의 정보 제어 연동 권한이 없습니다."], critical: true });
                  return;
                }
              }

              const rowErrors = getValidationErrors(rowAsset, false, []);
              if (rowErrors.length > 0) {
                errorsFound++;
                feedbackList.push({ row: idx + 2, mgmtNo: rowAsset.mgmtNo, errors: rowErrors, critical: true });
              } else {
                parsedAssets.push(rowAsset);
                feedbackList.push({ row: idx + 2, mgmtNo: rowAsset.mgmtNo, errors: ["검증 통과 (반영 대기)"], critical: false });
              }
            });

            setCsvFeedback({ total: dataLines.length, successCount: parsedAssets.length, errorCount: errorsFound, details: feedbackList });

            if (parsedAssets.length > 0) {
              showConfirm(`이상 징후가 없는 안전한 ${parsedAssets.length}건의 실사 레코드를 가상 로컬 스토리지에 즉시 오버라이드할까요?`, () => {
                const updatedAssets = [...assets];
                parsedAssets.forEach(item => {
                  const newItem = { ...item, updatedBy: `${currentUser.dept.part} 일괄엑셀실사`, updatedAt: new Date().toISOString() };
                  const existingIdx = updatedAssets.findIndex(a => a.assetNo === item.assetNo);
                  if (existingIdx !== -1) updatedAssets[existingIdx] = newItem;
                  else updatedAssets.push(newItem);
                });
                localStorage.setItem(`mock_assets_${appId}`, JSON.stringify(updatedAssets));
                setAssets(updatedAssets);
                showNotification("success", "대량 실사 가공 대장이 모크 스토리지에 무결성 결합되었습니다.");
                setIsUploadModalOpen(false); setCsvText(""); setCsvFeedback(null);
              });
            } else {
              showAlert("정합성 테이블 조건을 충족하는 유효 레코드가 감지되지 않았습니다.");
            }
          };

          // ======================================================================
          // 5. 실시간 데이터 스트림 대시보드 통계 및 실시간 필터 가공 (useMemo)
          // ======================================================================
          const stats = useMemo(() => {
            const myDeptAssets = assets.filter(asset => {
              if (currentUser && currentUser.dept.id !== 'admin') {
                return `${asset.upperDept} ${asset.dept}`.includes(currentUser.dept.part);
              }
              return true;
            });

            const total = myDeptAssets.length;
            const completed = myDeptAssets.filter(a => a.surveyDept?.trim() && a.surveyUser?.trim() && a.purpose && a.status && a.statusDetail).length;
            const rate = total > 0 ? Math.round((completed / total) * 100) : 0;
            const anomalyCount = validationAnomalies.length;

            const deptProgress = {};
            DEPARTMENTS.filter(d => d.id !== "admin").forEach(d => {
              const deptAssets = assets.filter(a => `${a.upperDept} ${a.dept}`.includes(d.part));
              const deptTotal = deptAssets.length;
              const deptCompleted = deptAssets.filter(a => a.surveyDept?.trim() && a.surveyUser?.trim() && a.purpose && a.status && a.statusDetail).length;
              const deptRate = deptTotal > 0 ? Math.round((deptCompleted / deptTotal) * 100) : 0;
              const isOfficialSubmitted = deptTotal > 0 && deptAssets.every(a => a.submitStatus === "제출완료");
              deptProgress[d.id] = { name: d.part, total: deptTotal, completed: deptCompleted, rate: deptRate, submitted: isOfficialSubmitted };
            });

            return { total, completed, rate, anomalyCount, deptProgress };
          }, [assets, validationAnomalies, currentUser]);

          const filteredAssets = useMemo(() => {
            return assets.filter(asset => {
              if (currentUser && currentUser.dept.id !== 'admin') {
                if (!`${asset.upperDept} ${asset.dept}`.includes(currentUser.dept.part)) return false;
              }
              const q = searchQuery.toLowerCase();
              const matchSearch = q === "" || 
                (asset.assetNo && asset.assetNo.includes(q)) ||
                (asset.mgmtNo && asset.mgmtNo.toLowerCase().includes(q)) ||
                (asset.modelName && asset.modelName.toLowerCase().includes(q)) ||
                (asset.user && asset.user.toLowerCase().includes(q)) ||
                (asset.surveyUser && asset.surveyUser.toLowerCase().includes(q));

              const matchUpperDept = filterUpperDept === "전체" || asset.upperDept === filterUpperDept;
              const matchItemName = filterItemName === "전체" || asset.itemName === filterItemName;

              let matchSurvey = true;
              if (filterSurveyStatus === "완료") {
                matchSurvey = asset.submitStatus === "제출완료" || asset.submitStatus === "임시저장";
              } else if (filterSurveyStatus === "미조사") {
                matchSurvey = asset.submitStatus !== "제출완료" && asset.submitStatus !== "임시저장";
              }

              return matchSearch && matchUpperDept && matchItemName && matchSurvey;
            });
          }, [assets, searchQuery, filterUpperDept, filterItemName, filterSurveyStatus, currentUser]);

          // ======================================================================
          // 6. 고해상도 렌더링 마크업 영역 (JSX 인터페이스 100% 매핑)
          // ======================================================================
          return (
            <div className="min-h-screen bg-slate-900 text-slate-100 font-sans flex flex-col antialiased">
              
              {/* 알림 토스트 피드백 */}
              {notification && (
                <div className="fixed top-5 right-5 z-50 transition-all transform duration-300">
                  <div className={`flex items-center gap-2 px-4 py-3 rounded-xl shadow-2xl border text-xs font-bold ${
                    notification.type === "success" ? "bg-emerald-950/90 border-emerald-500/30 text-emerald-300" : "bg-rose-950/90 border-rose-500/30 text-rose-300"
                  }`}>
                    {notification.type === "success" ? <CheckCircle className="w-4 h-4" /> : <AlertTriangle className="w-4 h-4" />}
                    {notification.text}
                  </div>
                </div>
              )}

              {/* 로딩 백드롭 인디케이터 */}
              {loading && (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center gap-3">
                  <RefreshCw className="w-10 h-10 text-indigo-500 animate-spin" />
                  <p className="text-xs text-indigo-300 font-bold tracking-wider">메모리 동기화 로딩 중...</p>
                </div>
              )}

              {/* A. 게이트웨이 인증 화면 */}
              {!currentUser ? (
                <div className="flex-1 flex items-center justify-center px-4 py-12 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
                  <div className="max-w-md w-full space-y-8 bg-slate-800/60 p-8 rounded-2xl border border-slate-700/50 backdrop-blur-xl shadow-2xl">
                    <div className="text-center">
                      <div className="inline-flex p-3 bg-indigo-500/10 rounded-2xl border border-indigo-500/30 text-indigo-400 mb-4">
                        <Database className="w-10 h-10" />
                      </div>
                      <h2 className="text-2xl sm:text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white via-indigo-200 to-indigo-400 bg-clip-text text-transparent whitespace-nowrap">
                        전사 전산기기 자산조사
                      </h2>
                      <div className="mt-2">
                        <span className="text-[11px] px-2.5 py-0.5 rounded-full font-mono border font-bold bg-amber-500/10 text-amber-400 border-amber-500/20">
                          ● GitHub Web Sandbox Active
                        </span>
                      </div>
                    </div>

                    <form className="mt-6 space-y-6" onSubmit={handleLogin}>
                      {loginError && (
                        <div className="p-3 bg-rose-500/10 border border-rose-500/20 rounded-lg text-xs text-rose-400 flex items-center gap-2">
                          <AlertCircle className="w-4 h-4" /> {loginError}
                        </div>
                      )}
                      <div className="space-y-4 text-left">
                        <div>
                          <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">부서 권한 선택</label>
                          <select
                            value={selectedDeptId}
                            onChange={(e) => { setSelectedDeptId(e.target.value); setLoginError(""); }}
                            className="w-full bg-slate-900/90 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                          >
                            {DEPARTMENTS.map(d => (
                              <option key={d.id} value={d.id}>
                                {d.id === 'admin' ? `★ ${d.part}` : `[${d.upper}] ${d.team} - ${d.part}`}
                              </option>
                            ))}
                          </select>
                        </div>
                        <div>
                          <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">통합 비밀번호 검증</label>
                          <input
                            type="password" required value={userPasswordInput} onChange={(e) => setUserPasswordInput(e.target.value)}
                            placeholder="액세스 패스워드를 입력하세요."
                            className="w-full bg-slate-900/90 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                          />
                          <p className="text-[11px] text-slate-500 mt-2">
                            ※ 인증 키 가이드: <span className="text-amber-400 font-semibold">현업 부서: 1234</span> / <span className="text-indigo-400 font-semibold">최고 관리자: admin</span>
                          </p>
                        </div>
                      </div>
                      <button type="submit" className="w-full flex justify-center py-3 px-4 text-sm font-semibold rounded-xl text-white bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 shadow-lg">
                        조사 플랫폼 시스템 접속
                      </button>
                    </form>
                  </div>
                </div>
              ) : (
                
                // B. 오리지널 메인 플랫폼 비즈니스 캔버스
                <div className="flex-1 flex flex-col">
                  <header className="bg-slate-950/80 backdrop-blur-md border-b border-slate-800/70 sticky top-0 z-40 px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4 text-left">
                    <div className="flex items-center gap-3">
                      <div className="p-2 bg-indigo-500/10 text-indigo-400 rounded-xl border border-indigo-500/20">
                        <Layers className="w-6 h-6" />
                      </div>
                      <div>
                        <h1 className="text-xl font-black text-white tracking-wide flex items-center gap-2">
                          전사 전산기기 자산조사
                          <span className="text-xs px-2.5 py-0.5 rounded-full font-mono font-bold bg-amber-500/10 text-amber-400 border-amber-500/20">
                            Local Sandbox Sync
                          </span>
                        </h1>
                      </div>
                    </div>

                    <div className="flex items-center gap-4 bg-slate-900 px-4 py-2 rounded-xl border border-slate-800">
                      <div className="text-right">
                        <span className="text-xs text-slate-400 block">현재 세션 권한</span>
                        <span className="text-sm font-semibold text-indigo-300">
                          {currentUser.dept.id === 'admin' ? "★ 전사 최고 관리자 권한" : `[${currentUser.dept.upper}] ${currentUser.dept.part}`}
                        </span>
                      </div>
                      <div className="h-8 w-[1px] bg-slate-800" />
                      <div className="flex items-center gap-2">
                        <div className="bg-indigo-600/20 text-indigo-300 p-1.5 rounded-lg text-xs font-bold flex items-center gap-1">
                          {currentUser.dept.id === 'admin' ? <ShieldCheck className="w-3.5 h-3.5 text-indigo-400" /> : <UserCheck className="w-3.5 h-3.5 text-slate-400" />}
                          {currentUser.name}
                        </div>
                      </div>
                      <button onClick={handleLogout} className="p-2 text-slate-400 hover:text-rose-400 hover:bg-slate-800 rounded-lg transition" title="로그아웃"><LogOut className="w-4 h-4" /></button>
                    </div>
                  </header>

                  <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 space-y-6">
                    {/* 실시간 통계 대시보드 리포트 패널 */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-left">
                      <div className="bg-slate-800/40 border border-slate-700/40 p-5 rounded-2xl flex items-center justify-between shadow-sm">
                        <div>
                          <span className="text-xs text-slate-400 font-bold">조사 대상 전산기기 총량</span>
                          <div className="text-3xl font-black text-white mt-1">{stats.total} 대</div>
                        </div>
                        <div className="p-3 bg-indigo-500/10 text-indigo-400 rounded-xl"><Database className="w-6 h-6" /></div>
                      </div>
                      <div className="bg-slate-800/40 border border-slate-700/40 p-5 rounded-2xl flex items-center justify-between shadow-sm">
                        <div>
                          <span className="text-xs text-slate-400 font-bold">실사 명세 검증 충족 수량</span>
                          <div className="text-3xl font-black text-emerald-400 mt-1">{stats.completed} 대</div>
                          <div className="w-28 bg-slate-700 h-1.5 rounded-full mt-2 overflow-hidden">
                            <div className="bg-emerald-400 h-full" style={{ width: `${stats.rate}%` }}></div>
                          </div>
                        </div>
                        <div className="text-right">
                          <div className="text-lg font-black text-white">{stats.rate}%</div>
                          <span className="text-[10px] text-emerald-500">실시간 진척율</span>
                        </div>
                      </div>
                    </div>

                    {/* 무결성 정합성 센터 이상 진단 가이드 리포트 */}
                    {validationAnomalies.length > 0 && (
                      <div className="bg-rose-950/20 border border-rose-500/30 rounded-2xl p-4 text-left">
                        <div className="flex items-center gap-2 text-rose-400 font-bold text-sm mb-3">
                          <AlertTriangle className="w-5 h-5 animate-pulse text-rose-500" />
                          <span>전사 자산관리 규격 정합성 이상 진단 배너 ({validationAnomalies.length}건 위험 포착)</span>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 max-h-40 overflow-y-auto pr-2 text-xs">
                          {validationAnomalies.map((ano, index) => (
                            <div key={index} className="bg-slate-900/95 border border-rose-500/10 p-3 rounded-xl space-y-1">
                              <div className="flex justify-between font-bold text-slate-300">
                                <span>자산번호: {ano.assetNo}</span>
                                <span className="text-rose-500 font-mono">관리코드: {ano.mgmtNo}</span>
                              </div>
                              <p className="text-slate-400">품목유형: {ano.itemName} / 소속: {ano.dept}</p>
                              <div className="text-rose-400 space-y-0.5 mt-1 border-t border-slate-800 pt-1 font-mono text-[11px]">
                                {ano.errors.map((e, idx) => <p key={idx}>• {e}</p>)}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* 현장 부서별 실사 진척 현황 대시보드 */}
                    <div className="bg-slate-900/60 border border-slate-800 p-4 rounded-2xl text-left">
                      <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3 flex items-center gap-2">
                        <UserCheck className="w-4 h-4 text-indigo-400" /> 전사 현장 부서별 실사 진척 지표 모니터링
                      </h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        {Object.entries(stats.deptProgress).map(([key, value]) => {
                          const isCurrentUserDept = currentUser?.dept?.id === key;
                          return (
                            <div key={key} className={`p-3 rounded-xl border ${isCurrentUserDept ? 'bg-indigo-950/30 border-indigo-500/30' : 'bg-slate-950/40 border-slate-800'}`}>
                              <div className="flex justify-between items-start text-xs mb-1 gap-2">
                                <span className={`font-semibold truncate max-w-[180px] ${isCurrentUserDept ? 'text-indigo-300 font-bold' : 'text-slate-300'}`}>
                                  {value.name} {isCurrentUserDept && "(내 가동 관할)"}
                                </span>
                                {value.submitted ? (
                                  <span className="text-[10px] px-1.5 py-0.5 rounded bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 font-bold shrink-0">제출완료</span>
                                ) : (
                                  <span className="text-[10px] px-1.5 py-0.5 rounded bg-slate-800 text-slate-400 border border-slate-700 shrink-0 font-medium">실사중</span>
                                )}
                              </div>
                              <div className="flex justify-between items-center text-[11px] text-slate-400 font-mono mb-1.5">
                                <span>매핑 완료율</span>
                                <span>{value.completed}/{value.total}대 ({value.rate}%)</span>
                              </div>
                              <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                <div className={`h-full rounded-full transition-all duration-500 ${value.submitted ? 'bg-emerald-400' : value.rate > 50 ? 'bg-indigo-400' : 'bg-slate-600'}`} style={{ width: `${value.rate}%` }} />
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* 컨트롤 필터 및 업무 일괄 제어 트레이 상단 단일 컴포넌트 */}
                    <div className="bg-slate-900/80 p-5 rounded-2xl border border-slate-800 flex flex-col gap-4 text-left">
                      <div className="flex flex-col lg:flex-row gap-3 justify-between items-stretch lg:items-center">
                        <div className="relative flex-1 max-w-sm">
                          <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><Search className="w-5 h-5" /></span>
                          <input
                            type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                            placeholder="자산식별번호 / 전산번호 / 모델명 / 실사용자 검색..."
                            className="w-full bg-slate-950 border border-slate-700/60 rounded-xl pl-10 pr-4 py-2 text-xs text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                          />
                        </div>

                        <div className="flex flex-row flex-nowrap items-center gap-2 bg-slate-950/80 p-2.5 rounded-xl border border-slate-800 overflow-x-auto whitespace-nowrap shrink-0">
                          <span className="text-[10px] font-bold text-indigo-400 uppercase tracking-wide block mr-1 shrink-0">실사 액션 트레이:</span>
                          <button type="button" disabled={isDeptSubmitted} onClick={handleApplyMyDeptAll} className={`px-3 py-2 rounded-lg text-xs font-semibold border transition flex items-center gap-1 shrink-0 ${isDeptSubmitted ? 'bg-slate-800/50 text-slate-600 border-slate-800 cursor-not-allowed' : 'bg-slate-900 hover:bg-slate-850 text-indigo-300 border-indigo-500/20 cursor-pointer'}`}>
                            <CheckSquare className="w-3.5 h-3.5" /> 내 소속 일괄입력
                          </button>
                          <button type="button" disabled={isDeptSubmitted} onClick={handleBatchSaveTemp} className={`px-3 py-2 rounded-lg text-xs font-semibold transition shadow flex items-center gap-1 shrink-0 ${isDeptSubmitted ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-amber-600 hover:bg-amber-500 text-white cursor-pointer'}`}>
                            <Save className="w-3.5 h-3.5" /> 임시저장
                          </button>
                          <button type="button" disabled={!hasTempSaved || isDeptSubmitted} onClick={handleBatchSubmitFinal} className={`px-3 py-2 rounded-lg text-xs font-semibold transition flex items-center gap-1 shrink-0 ${hasTempSaved && !isDeptSubmitted ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow cursor-pointer' : 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700'}`}>
                            <CheckCircle className="w-3.5 h-3.5" /> 결과제출
                          </button>
                          {currentUser?.dept?.id !== 'admin' && (
                            <button type="button" disabled={!isDeptSubmitted} onClick={handleBatchCancelSubmit} className={`px-3 py-2 rounded-lg text-xs font-semibold border transition flex items-center gap-1 shrink-0 ${isDeptSubmitted ? 'bg-rose-950/40 hover:bg-rose-900/60 text-rose-300 border-rose-500/30 cursor-pointer shadow-lg' : 'bg-slate-800 text-slate-600 border-slate-800 cursor-not-allowed'}`}>
                              <X className="w-3.5 h-3.5 text-rose-500" /> 제출취소
                            </button>
                          )}
                        </div>

                        <div className="flex flex-wrap items-center gap-2">
                          {currentUser?.dept?.id === 'admin' ? (
                            <>
                              <button
                                onClick={() => {
                                  setFormAsset({
                                    assetNo: "", mgmtNo: "", itemName: "pc본체(일반형)", modelName: "DB181-2(삼보)", acquireDate: new Date().toISOString().substring(0, 10),
                                    upperDept: "경영지원실", dept: "운영지원팀-사업운영지원파트", address: "", addressDetail: "", user: "", surveyDept: "", surveyUser: "", purpose: "", status: "", statusDetail: "", basis: "", memo: "", submitStatus: ""
                                  });
                                  setIsAddModalOpen(true);
                                }}
                                className="flex items-center gap-1.5 px-3 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-semibold shadow transition"
                              >
                                <Plus className="w-3.5 h-3.5" /> 자산 수기등록 (ADMIN)
                              </button>
                              <button onClick={() => setIsUploadModalOpen(true)} className="flex items-center gap-1.5 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-xs font-semibold transition border border-slate-700"><Upload className="w-3.5 h-3.5 text-indigo-400" /> 원천 엑셀 업로드</button>
                              <button onClick={forceReloadInitialDatabase} title="기초 시드 리셋 덮어쓰기" className="p-2 bg-slate-800 hover:bg-rose-950 hover:text-rose-400 text-slate-400 rounded-xl transition border border-slate-700"><RefreshCw className="w-3.5 h-3.5 text-rose-500" /></button>
                            </>
                          ) : (
                            <button onClick={() => setIsUploadModalOpen(true)} disabled={isDeptSubmitted} className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-semibold transition border shadow-md shrink-0 ${isDeptSubmitted ? 'bg-slate-800 text-slate-600 border-slate-800 cursor-not-allowed shadow-none' : 'bg-slate-800 hover:bg-slate-700 text-indigo-300 border-indigo-500/20 cursor-pointer'}`}><Upload className="w-3.5 h-3.5 text-indigo-400" /> 실사결과 CSV 업로드</button>
                          )}
                          <button onClick={handleExportCSV} className="flex items-center gap-1.5 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-xs font-semibold transition border border-slate-700"><Download className="w-3.5 h-3.5 text-emerald-400" /> CSV 파일 내보내기</button>
                        </div>
                      </div>

                      {/* 하단 세부 필터 레이어 */}
                      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 pt-2.5 border-t border-slate-800/80">
                        <div>
                          <label className="block text-[9px] font-bold text-slate-400 uppercase tracking-wide mb-1 flex items-center gap-1"><Filter className="w-3 h-3 text-indigo-400" /> 상위 대장 소속 필터</label>
                          <select value={filterUpperDept} onChange={(e) => setFilterUpperDept(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-2.5 py-1.5 text-xs text-slate-300 focus:outline-none">
                            <option value="전체">전체 상위부서</option>
                            <option value="경영지원실">경영지원실</option>
                            <option value="GA영업부문">GA영업부문</option>
                            <option value="전속영업부문">전속영업부문</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-[9px] font-bold text-slate-400 uppercase tracking-wide mb-1 flex items-center gap-1"><Filter className="w-3 h-3 text-indigo-400" /> 대장 품목 카테고리</label>
                          <select value={filterItemName} onChange={(e) => setFilterItemName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-2.5 py-1.5 text-xs text-slate-300 focus:outline-none">
                            <option value="전체">전체 품목</option>
                            {ITEMS.map(i => <option key={i.name} value={i.name}>{i.name}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-[9px] font-bold text-slate-400 uppercase tracking-wide mb-1 flex items-center gap-1"><Filter className="w-3 h-3 text-indigo-400" /> 실사 기입 충족 필터</label>
                          <select value={filterSurveyStatus} onChange={(e) => setFilterSurveyStatus(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-2.5 py-1.5 text-xs text-slate-300 focus:outline-none">
                            <option value="전체">전체 실사목록</option>
                            <option value="완료">실사완료 (기입 충족)</option>
                            <option value="미조사">미완료/진행중 대상</option>
                          </select>
                        </div>
                      </div>
                    </div>

                    {/* 메인 와이드 데이터 테이블 컨테이너 영역 */}
                    <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-2xl">
                      <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse table-fixed min-w-[1750px]">
                          <thead>
                            <tr className="bg-slate-950/80 border-b border-slate-800 text-[11px] font-bold tracking-wider text-slate-400 uppercase">
                              <th className="py-4 px-3 w-[120px]">품목명</th>
                              <th className="py-4 px-3 w-[160px]">전산관리번호</th>
                              <th className="py-4 px-3 w-[190px]">자산번호</th>
                              <th className="py-4 px-3 w-[180px]">원천 부서소속</th>
                              <th className="py-4 px-3 w-[150px]">모델명 / 취득일</th>
                              <th className="py-4 px-3 w-[100px]">대장사용자</th>
                              <th className="py-4 px-3 w-[220px] bg-indigo-950/40 text-indigo-300 font-black">실제 현 사용부서 <span className="text-rose-500">*</span></th>
                              <th className="py-4 px-3 w-[120px] bg-indigo-950/40 text-indigo-300 font-black">실제 현 사용자 <span className="text-rose-500">*</span></th>
                              <th className="py-4 px-3 w-[110px] bg-indigo-950/40 text-indigo-300 font-black">용도 규격 <span className="text-rose-500">*</span></th>
                              <th className="py-4 px-3 w-[100px] bg-indigo-950/40 text-indigo-300 font-black">자산상태 <span className="text-rose-500">*</span></th>
                              <th className="py-4 px-3 w-[120px] bg-indigo-950/40 text-indigo-300 font-black">자산상태 세부 <span className="text-rose-500">*</span></th>
                              <th className="py-4 px-3 w-[160px] bg-indigo-950/40 text-indigo-300 font-black">관련근거</th>
                              <th className="py-4 px-3 w-[160px] bg-indigo-950/40 text-indigo-300 font-black">비고 명세</th>
                              <th className="py-4 px-3 w-[100px] text-center font-bold text-slate-400">제출여부</th>
                              {currentUser?.dept?.id === 'admin' && <th className="py-4 px-3 w-[70px] text-center text-amber-500 font-bold">관리</th>}
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-800/80 text-xs text-left">
                            {filteredAssets.length === 0 ? (
                              <tr>
                                <td colSpan={currentUser?.dept?.id === 'admin' ? 15 : 14} className="py-16 text-center text-slate-500">
                                  <FileText className="w-12 h-12 mx-auto mb-3 opacity-35" /> 검색 매칭 자산 명세가 식별되지 않습니다.
                                </td>
                              </tr>
                            ) : (
                              filteredAssets.map((asset) => {
                                const isSurveyValid = asset.surveyDept?.trim() && asset.surveyUser?.trim() && asset.purpose && asset.status && asset.statusDetail;
                                const isDone = asset.submitStatus === "제출완료" && isSurveyValid;
                                const isAnomaly = validationAnomalies.some(a => a.assetNo === asset.assetNo);

                                const currentEdit = rowEdits[asset.assetNo] || {};
                                const valSurveyDept = currentEdit.surveyDept !== undefined ? currentEdit.surveyDept : (asset.surveyDept || "");
                                const valSurveyUser = currentEdit.surveyUser !== undefined ? currentEdit.surveyUser : (asset.surveyUser || "");
                                const valPurpose = currentEdit.purpose !== undefined ? currentEdit.purpose : (asset.purpose || "");
                                const valStatus = currentEdit.status !== undefined ? currentEdit.status : (asset.status || "");
                                const valStatusDetail = currentEdit.statusDetail !== undefined ? currentEdit.statusDetail : (asset.statusDetail || "");
                                const valBasis = currentEdit.basis !== undefined ? currentEdit.basis : (asset.basis || "");
                                const valMemo = currentEdit.memo !== undefined ? currentEdit.memo : (asset.memo || "");

                                return (
                                  <tr key={asset.assetNo} className={`hover:bg-slate-800/30 transition-colors ${isDone ? 'bg-emerald-950/5' : 'bg-indigo-950/5'} ${isAnomaly ? 'border-l-4 border-l-rose-500' : ''}`}>
                                    <td className="py-3 px-3 font-semibold text-slate-300 truncate"><span className="px-2 py-1 rounded bg-slate-950 border border-slate-700 text-[10px]">{asset.itemName}</span></td>
                                    <td className="py-3 px-3 font-mono text-indigo-400 font-bold">{asset.mgmtNo || "-"}</td>
                                    <td className="py-3 px-3 font-mono text-slate-200">{asset.assetNo}</td>
                                    <td className="py-3 px-3 truncate"><span className="text-[10px] text-slate-500 block">{asset.upperDept}</span><span className="font-medium text-slate-300">{asset.dept}</span></td>
                                    <td className="py-3 px-3 truncate"><div className="text-slate-200 font-semibold">{asset.modelName}</div><div className="text-slate-500 text-[10px]">{asset.acquireDate}</div></td>
                                    <td className="py-3 px-3 truncate"><span className="px-2 py-0.5 rounded bg-slate-950 border border-slate-800 text-slate-400">{asset.user || "공용"}</span></td>
                                    
                                    <td className="py-3 px-3 bg-indigo-950/10"><input type="text" disabled={isDeptSubmitted} placeholder="현 파트명 입력" value={valSurveyDept} onChange={(e) => handleFieldChange(asset.assetNo, 'surveyDept', e.target.value)} className={`w-full bg-slate-950 border focus:border-indigo-500 rounded px-2 py-1 text-xs text-white disabled:opacity-50 ${!valSurveyDept ? 'border-rose-500/40 bg-rose-950/5' : 'border-slate-800'}`} /></td>
                                    <td className="py-3 px-3 bg-indigo-950/10"><input type="text" disabled={isDeptSubmitted} placeholder="성명" value={valSurveyUser} onChange={(e) => handleFieldChange(asset.assetNo, 'surveyUser', e.target.value)} className={`w-full bg-slate-950 border focus:border-indigo-500 rounded px-2 py-1 text-xs text-white disabled:opacity-50 ${!valSurveyUser ? 'border-rose-500/40 bg-rose-950/5' : 'border-slate-800'}`} /></td>
                                    <td className="py-3 px-3 bg-indigo-950/10">
                                      <select disabled={isDeptSubmitted} value={valPurpose} onChange={(e) => handleFieldChange(asset.assetNo, 'purpose', e.target.value)} className={`w-full bg-slate-950 border focus:border-indigo-500 rounded px-1 py-1 text-xs text-white disabled:opacity-50 ${!valPurpose ? 'border-rose-500/40 bg-rose-950/5' : 'border-slate-800'}`}>
                                        <option value="">선택</option>
                                        {PURPOSES.map(p => <option key={p} value={p}>{p}</option>)}
                                      </select>
                                    </td>
                                    <td className="py-3 px-3 bg-indigo-950/10">
                                      <select disabled={isDeptSubmitted} value={valStatus} onChange={(e) => handleFieldChange(asset.assetNo, 'status', e.target.value)} className={`w-full bg-slate-950 border focus:border-indigo-500 rounded px-1 py-1 text-xs text-white font-bold disabled:opacity-50 ${!valStatus ? 'border-rose-500/40 bg-rose-950/5' : 'border-slate-800'}`}>
                                        <option value="">선택</option><option value="보유">보유</option><option value="미보유">미보유</option>
                                      </select>
                                    </td>
                                    <td className="py-3 px-3 bg-indigo-950/10">
                                      <select disabled={!valStatus || isDeptSubmitted} value={valStatusDetail} onChange={(e) => handleFieldChange(asset.assetNo, 'statusDetail', e.target.value)} className={`w-full bg-slate-950 border focus:border-indigo-500 rounded px-1 py-1 text-xs text-white disabled:opacity-40 ${!valStatusDetail ? 'border-rose-500/40 bg-rose-950/5' : 'border-slate-800'}`}>
                                        <option value="">선택</option>
                                        {valStatus === "보유" && SURVEY_STATUS["보유"].map(sd => <option key={sd} value={sd}>{sd}</option>)}
                                        {valStatus === "미보유" && SURVEY_STATUS["미보유"].map(sd => <option key={sd} value={sd}>{sd}</option>)}
                                      </select>
                                    </td>
                                    <td className="py-3 px-3 bg-indigo-950/10"><input type="text" disabled={isDeptSubmitted} placeholder="결재문서번호" value={valBasis} onChange={(e) => handleFieldChange(asset.assetNo, 'basis', e.target.value)} className="w-full bg-slate-950 border border-slate-800 focus:border-indigo-500 rounded px-2 py-1 text-xs text-white disabled:opacity-50" /></td>
                                    <td className="py-3 px-3 bg-indigo-950/10"><input type="text" disabled={isDeptSubmitted} placeholder="특이 메모" value={valMemo} onChange={(e) => handleFieldChange(asset.assetNo, 'memo', e.target.value)} className="w-full bg-slate-950 border border-slate-800 focus:border-indigo-500 rounded px-2 py-1 text-xs text-white disabled:opacity-50" /></td>
                                    
                                    <td className="py-3 px-3 text-center">
                                      {asset.submitStatus ? (
                                        <span className={`px-2 py-0.5 rounded text-[9px] font-bold block ${asset.submitStatus === '제출완료' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-amber-500/10 text-amber-400 border-amber-500/20'}`}>{asset.submitStatus}</span>
                                      ) : (
                                        <span className="px-2 py-0.5 rounded text-[9px] font-bold bg-slate-800 text-slate-400 border border-slate-700 block">미조사</span>
                                      )}
                                    </td>
                                    {currentUser?.dept?.id === 'admin' && (
                                      <td className="py-3 px-3 text-center">
                                        <button onClick={() => { setSelectedAsset({ ...asset, id: asset.assetNo }); setIsEditModalOpen(true); }} className="p-1.5 text-indigo-400 hover:text-white hover:bg-indigo-600/20 rounded transition"><Edit2 className="w-3.5 h-3.5" /></button>
                                      </td>
                                    )}
                                  </tr>
                                );
                              })
                            )}
                          </tbody>
                        </table>
                      </div>
                      <div className="bg-slate-950/40 p-4 border-t border-slate-800 text-slate-400 text-xs text-left">
                        <span>현재 매칭 대수: <strong>{filteredAssets.length}</strong> / 전체 {assets.length}대</span>
                      </div>
                    </div>
                  </main>
                </div>
              )}

              {/* D. [ADMIN 전용] 대장 원천 정보 강제 치환 모달 */}
              {isEditModalOpen && selectedAsset && currentUser?.dept?.id === 'admin' && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
                  <div className="bg-slate-900 border border-slate-700/80 w-full max-w-2xl rounded-2xl overflow-hidden shadow-2xl">
                    <div className="bg-slate-950 p-5 border-b border-slate-800 flex justify-between items-center">
                      <h3 className="text-base font-bold text-white flex items-center gap-2"><Edit2 className="w-5 h-5 text-indigo-400" /> 원천 정보 최고관리자 강제 역매핑 수정</h3>
                      <button onClick={() => setIsEditModalOpen(false)} className="text-slate-400 hover:text-white"><X className="w-5 h-5" /></button>
                    </div>
                    <form onSubmit={handleUpdateAssetBase} className="p-6 space-y-5 text-left text-xs">
                      <div className="bg-slate-950/50 p-4 rounded-xl border border-slate-800 grid grid-cols-2 gap-4">
                        <div className="col-span-2 grid grid-cols-2 gap-4">
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 mb-1">자산 고유키 고정 (19자리 고유숫자)</label>
                            <input type="text" value={selectedAsset.assetNo || ""} onChange={(e) => setSelectedAsset({ ...selectedAsset, assetNo: e.target.value })} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-indigo-400 font-mono font-bold" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 mb-1">전산관리 규격번호</label>
                            <input type="text" value={selectedAsset.mgmtNo || ""} onChange={(e) => setSelectedAsset({ ...selectedAsset, mgmtNo: e.target.value })} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 font-mono" />
                          </div>
                        </div>
                        <div>
