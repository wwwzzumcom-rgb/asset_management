                          <label className="block text-[10px] font-bold text-slate-400 mb-1">품목 매핑 분류</label>
                          <select value={selectedAsset.itemName} onChange={(e) => setSelectedAsset({ ...selectedAsset, itemName: e.target.value })} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white">
                            {ITEMS.map(i => <option key={i.name} value={i.name}>{i.name}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold text-slate-400 mb-1">모델 명칭</label>
                          <input type="text" value={selectedAsset.modelName || ""} onChange={(e) => setSelectedAsset({ ...selectedAsset, modelName: e.target.value })} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white" />
                        </div>
                        <div className="col-span-2 grid grid-cols-3 gap-3">
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 mb-1">마스터 상위부서</label>
                            <input type="text" value={selectedAsset.upperDept || ""} onChange={(e) => setSelectedAsset({ ...selectedAsset, upperDept: e.target.value })} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 mb-1">사용부서(대장)</label>
                            <input type="text" value={selectedAsset.dept || ""} onChange={(e) => setSelectedAsset({ ...selectedAsset, dept: e.target.value })} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 mb-1">대장 사용자</label>
                            <input type="text" value={selectedAsset.user || ""} onChange={(e) => setSelectedAsset({ ...selectedAsset, user: e.target.value })} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2" />
                          </div>
                        </div>
                      </div>
                      <div className="pt-4 border-t border-slate-800 flex justify-between items-center">
                        <button type="button" onClick={() => handleDeleteAsset(selectedAsset.id || selectedAsset.assetNo)} className="px-4 py-2 bg-rose-950/40 hover:bg-rose-900 text-rose-300 rounded-xl font-semibold border border-rose-500/20">데이터 마스터 영구 삭제</button>
                        <div className="flex gap-2">
                          <button type="button" onClick={() => setIsEditModalOpen(false)} className="px-4 py-2 bg-slate-800 text-slate-300 rounded-xl">취소</button>
                          <button type="submit" className="px-5 py-2 bg-indigo-600 text-white rounded-xl font-semibold">정보 가집계 강제적용</button>
                        </div>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* E. [ADMIN 전용] 새 자산 수기 대장 등록 모달 */}
              {isAddModalOpen && currentUser?.dept?.id === 'admin' && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
                  <div className="bg-slate-900 border border-slate-700/80 w-full max-w-xl rounded-2xl overflow-hidden shadow-2xl">
                    <div className="bg-slate-950 p-5 border-b border-slate-800 flex justify-between items-center">
                      <h3 className="text-base font-bold text-white flex items-center gap-2"><Plus className="w-5 h-5" /> 신규 원천 데이터 자산 수기 대장 개방</h3>
                      <button onClick={() => setIsAddModalOpen(false)} className="text-slate-400"><X className="w-5 h-5" /></button>
                    </div>
                    <form onSubmit={handleCreateAsset} className="p-6 space-y-4 text-left text-xs">
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                          <label className="block font-bold text-slate-300 mb-1">자산 식별 고유번호 (19자리 고유숫자)</label>
                          <input type="text" required value={formAsset.assetNo} onChange={(e) => setFormAsset({ ...formAsset, assetNo: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-indigo-300 font-mono" placeholder="19자리 수동 지정" />
                        </div>
                        <div>
                          <label className="block font-bold text-slate-300 mb-1">품목 분류군 매핑</label>
                          <select
                            value={formAsset.itemName}
                            onChange={(e) => {
                              const item = e.target.value;
                              const code = ITEMS.find(i => i.name === item)?.code || "T";
                              const dateStr = new Date().toISOString().substring(0, 10).replace(/-/g, '');
                              const randSeq = Math.floor(1000 + Math.random() * 9000).toString();
                              let defaultModel = "DB181-2(삼보)";
                              if (item === "pc본체(대리점용)") defaultModel = "50t(레노버)";
                              else if (item === "모니터") defaultModel = "모니터(24인치)";
                              else if (item === "노트북") defaultModel = "NT951XGK(삼성)";
                              setFormAsset({ ...formAsset, itemName: item, modelName: defaultModel, mgmtNo: `${code}${dateStr}${randSeq}` });
                            }}
                            className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2"
                          >
                            {ITEMS.map(i => <option key={i.name} value={i.name}>{i.name}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block font-bold text-slate-300 mb-1">전산관리번호 규격 매핑</label>
                          <input type="text" required value={formAsset.mgmtNo} onChange={(e) => setFormAsset({ ...formAsset, mgmtNo: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 font-mono" />
                        </div>
                        <div>
                          <label className="block font-bold text-slate-300 mb-1">모델 명칭 명세</label>
                          <input type="text" required value={formAsset.modelName} onChange={(e) => setFormAsset({ ...formAsset, modelName: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2" />
                        </div>
                      </div>
                      <div className="pt-4 border-t border-slate-800 flex justify-end gap-2">
                        <button type="button" onClick={() => setIsAddModalOpen(false)} className="px-4 py-2 bg-slate-800 text-slate-300 rounded-xl">취소</button>
                        <button type="submit" className="px-5 py-2 bg-indigo-600 text-white rounded-xl font-semibold">원천 대장 신규 인서트</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* F. 대량 CSV 덤프 파싱 검증 가이드 레이어 모달 */}
              {isUploadModalOpen && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
                  <div className="bg-slate-900 border border-slate-700/80 w-full max-w-3xl rounded-2xl overflow-hidden shadow-2xl">
                    <div className="bg-slate-950 p-5 border-b border-slate-800 flex justify-between items-center text-left">
                      <div className="flex items-center gap-2 text-white">
                        <FileSpreadsheet className="w-5 h-5 text-emerald-400" />
                        <h3 className="text-base font-bold">엑셀(CSV) 일괄 대량 실사 데이터 연동 업로드</h3>
                      </div>
                      <button onClick={() => { setIsUploadModalOpen(false); setCsvFeedback(null); setCsvText(""); }} className="text-slate-400"><X className="w-5 h-5" /></button>
                    </div>
                    <div className="p-6 space-y-4 text-left text-xs">
                      <div className="bg-slate-950/80 p-3 rounded-xl border border-slate-800 font-mono text-[11px]">
                        <p className="text-amber-400 font-bold mb-1">⚠️ 일괄 업로드 필수 바인딩 헤더 콤마 매핑 명세서:</p>
                        <div className="bg-slate-900 p-2 rounded overflow-x-auto text-slate-300 select-all">
                          자산번호,전산관리번호,품목명,모델명,취득연월일,상위부서,사용부서,주소,상세주소,사용자,실제현사용부서,실제현사용자,용도,상태,상태세부내용,관련근거,비고
                        </div>
                      </div>
                      <textarea
                        rows="5" value={csvText} onChange={(e) => setCsvText(e.target.value)}
                        placeholder={`"자산번호","전산관리번호","품목명"...\n"3059481101100003523","T202602180001","pc본체(일반형)"...`}
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 font-mono focus:outline-none focus:ring-1 focus:ring-emerald-500"
                      />
                      {csvFeedback && (
                        <div className="bg-slate-950 p-3 rounded-xl border border-slate-800 space-y-1.5">
                          <div className="flex justify-between font-bold border-b border-slate-800 pb-1.5">
                            <span>총 유입 레코드 행: {csvFeedback.total}건</span>
                            <span className="text-emerald-400">무결성 검증 패스: {csvFeedback.successCount}건</span>
                            <span className="text-rose-400">오류 파기대상: {csvFeedback.errorCount}건</span>
                          </div>
                          <div className="max-h-24 overflow-y-auto space-y-1 font-mono text-[11px]">
                            {csvFeedback.details.map((detail, dIdx) => (
                              <div key={dIdx} className={`p-1 rounded flex justify-between ${detail.critical ? 'bg-rose-950/20 text-rose-300' : 'bg-emerald-950/20 text-emerald-300'}`}>
                                <span>라인 {detail.row}: {detail.mgmtNo || "식별 키 오류"}</span>
                                <span>{detail.errors.join(" / ")}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                      <div className="pt-2 flex justify-end gap-2">
                        <button type="button" onClick={() => { setIsUploadModalOpen(false); setCsvFeedback(null); setCsvText(""); }} className="px-4 py-2 bg-slate-800 rounded-xl">취소</button>
                        <button type="button" onClick={handleUploadCSV} className="px-5 py-2 bg-emerald-600 text-white rounded-xl font-semibold">데이터 정합성 결함 진단 및 가반영</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* G. 공용 커스텀 모달 대화 상자 */}
              {customModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
                  <div className="bg-slate-900 border border-slate-700/80 w-full max-w-md rounded-2xl p-6 space-y-4 text-left">
                    <div className="flex items-center gap-3 text-white font-bold text-lg">
                      <AlertCircle className="w-6 h-6 text-indigo-400" />
                      <span>{customModal.title}</span>
                    </div>
                    <p className="text-sm text-slate-300 leading-relaxed whitespace-pre-wrap">{customModal.text}</p>
                    <div className="flex justify-end gap-2 pt-2 text-xs">
                      {customModal.type === "confirm" && (
                        <button type="button" onClick={() => setCustomModal(null)} className="px-4 py-2 bg-slate-800 text-slate-300 rounded-xl">취소</button>
                      )}
                      <button type="button" onClick={() => { if (customModal.onConfirm) customModal.onConfirm(); setCustomModal(null); }} className="px-5 py-2 bg-indigo-600 text-white rounded-xl font-semibold">의사 확정 수행</button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
